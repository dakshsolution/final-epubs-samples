name: Rebuild EPUB Index

on:
  push:

permissions:
  contents: write

concurrency:
  group: rebuild-epub-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml pypdfium2

      - name: Build EPUB index and split views
        run: python build_epub_index.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html extracted_epubs preview_images split_views

          if git diff --cached --quiet; then
            echo "No generated changes detected."
            exit 0
          fi

          git commit -m "chore: auto-update EPUB index [skip ci]"
          git push
